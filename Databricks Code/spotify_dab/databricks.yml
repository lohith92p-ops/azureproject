# This is a Databricks asset bundle definition for spotify_dab.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: spotify_dab
  uuid: e139306d-a5c7-4bb5-ba26-4c2750cd4174

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405613611962846.6.azuredatabricks.net:443
    variables:
      catalog: databricksazureproject
      schema: dev
    presets:
      artifacts_dynamic_version: true
  prod:
    mode: production
    workspace:
      host: https://adb-7405613611962846.6.azuredatabricks.net:443
      # We explicitly deploy to /Workspace/Users/lohith1002p@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/lohith1002p@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: databricksazureproject
      schema: prod
    permissions:
      - user_name: lohith1002p@gmail.com
        level: CAN_MANAGE
